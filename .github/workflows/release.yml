name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # GITHUB_TOKEN is sufficient when "Allow GitHub Actions to create and
          # approve pull requests" is enabled in Settings → Actions → General.
          # If that option is disabled, replace with a PAT (repo + workflow
          # scopes) stored as a repository secret, e.g.:
          #   token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
