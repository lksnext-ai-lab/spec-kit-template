name: Docs quality

on:
  pull_request:
    paths-ignore:
      - "docs/spec/history/**"
  push:
    branches: [ "main" ]
    paths-ignore:
      - "docs/spec/history/**"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint (spec only)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/spec/**/*.md
            !docs/spec/history/**

  mkdocs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
      - name: Build MkDocs site
        run: |
          mkdocs build
