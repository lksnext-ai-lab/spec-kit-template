site_name: Spec Kit
site_version: "2.1.0"
docs_dir: docs
watch:
  - docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
